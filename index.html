    <style>
        /* --- CORE AESTHETICS --- */
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            transition: 0.8s;
            text-align: center;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding-bottom: 80px;
        }

        body.light-mode {
            background-color: #f4f4f4;
            color: #1a1a1a;
        }

        h1, h2, h3 {
            font-family: 'Cinzel', serif;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .container {
            padding: 20px;
            max-width: 900px;
            margin: auto;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            margin: 40px auto;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        /* --- THE GLOW ENGINE --- */
        .gallery-img {
            width: 100%;
            max-width: 500px;
            border-radius: 15px;
            transition: 0.5s ease;
            filter: brightness(0.8);
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .gallery-img:hover {
            filter: brightness(1.2);
            transform: scale(1.03);
            box-shadow: 0 0 35px rgba(0, 123, 255, 0.7); /* Deep Blue Glow */
        }

        .caption {
            margin: 15px auto 10px;
            font-size: 1.1rem;
            font-style: italic;
            opacity: 0.9;
            color: #00d4ff;
        }

        /* Engagement Bar Styling */
        .engagement-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 15px 0;
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .share-btn {
            color: #25D366;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: bold;
            transition: 0.3s;
        }

        .share-btn:hover { transform: scale(1.1); }

        button {
            padding: 12px 25px;
            margin: 10px;
            cursor: pointer;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background-color: #007bff;
            color: white;
            font-weight: bold;
            transition: 0.3s;
        }

        .social-icon {

            margin: 0 20px;
            text-decoration: none;

    <script>
        // Theme Toggle

        // Mood Logic
        function changeMood(mood) {
            const img = document.getElementById('main-mood-img');
            const text = document.getElementById('mood-text');
            if (mood === 'happy') {
                img.src = 'image4.jpg'; 
                text.innerHTML = "Keep smiling, the world needs your light.";
                text.style.color = "#ffcc00";
            } else if (mood === 'deep') {
                img.src = 'image5.jpg';
                text.innerHTML = "Sometimes the deepest rivers flow in silence.";
                text.style.color = "#00d4ff";
            }
        }
