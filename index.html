<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;500&display=swap" rel="stylesheet">
    
    <title>Newton's JK World</title>
    
    <style>
        /* --- CORE STYLES --- */
        body {
            background-color: #1a1a1a; /* Starts in Dark Mode for that vibe */
            color: #ffffff;
            transition: 0.8s;
            text-align: center;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding-bottom: 80px;
            overflow-x: hidden;
        }

        /* Light Mode Override */
        body.light-mode {
            background-color: #f4f4f4;
            color: #1a1a1a;
        }

        h1, h2, h3 {
            font-family: 'Cinzel', serif;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .container {
            padding: 20px;
            max-width: 900px;
            margin: auto;
        }

        /* --- FROSTED GLASS PANELS --- */
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            margin: 40px auto;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        body.light-mode .glass-panel {
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
        }

        /* --- IMAGE & HOVER EFFECTS --- */
        .gallery-img {
            width: 90%;
            max-width: 600px;
            border-radius: 15px;
            margin-top: 30px;
            transition: all 0.5s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            filter: brightness(0.8);
        }

        .gallery-img:hover {
            filter: brightness(1.1);
            transform: scale(1.03);
            box-shadow: 0 15px 40px rgba(0, 123, 255, 0.3);
        }

        .caption {
            margin: 15px auto 60px;
            font-size: 1.1rem;
            font-style: italic;
            opacity: 0.7;
            letter-spacing: 1px;
            line-height: 1.6;
        }

        /* --- BUTTONS --- */
        button {
            padding: 12px 25px;
            margin: 10px;
            cursor: pointer;
            border-radius: 30px; /* Rounded pill style */
            border: 1px solid rgba(255, 255, 255, 0.2);
            background-color: #007bff;
            color: white;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        button:hover {
            background-color: #0056b3;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 123, 255, 0.4);
        }

        /* --- SOCIAL ICONS --- */
        .social-icon {
            font-size: 45px;
            margin: 0 20px;
            text-decoration: none;
            transition: 0.4s;
            display: inline-block;
        }

        .social-icon:hover {
            transform: translateY(-10px) rotate(5deg);
        }

        .whatsapp { color: #25D366; }
        .facebook { color: #1877F2; }
        .twitter  { color: #1DA1F2; }

        /* Floating Scroll to Top */
        .scroll-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            z-index: 100;
        }

        #mood-text {
            min-height: 50px;
            transition: 0.5s;
        }
    </style>
</head>

<body>

    <div class="container">
        <header style="margin-top: 50px;">
            <h1>Newton's JK World</h1>
            <p style="opacity: 0.6; letter-spacing: 4px;">Storywriter by Birth • Artist by Nature</p>
        </header>
        
        <div class="glass-panel">
            <h3>Mood Control Center</h3>
            <button id="theme-btn">Switch Theme</button>
            <hr style="opacity: 0.1; margin: 20px 0;">
            <p>How are we feeling today?</p>
            <button onclick="changeMood('happy')">Happy Vibes</button>
            <button onclick="changeMood('deep')">Deep Thoughts</button>
            
            <div class="mood-display">
                <h2 id="mood-text">Welcome to my space...</h2>
                <img id="main-mood-img" src="image1.jpg" alt="Mood Image" style="width: 100%; max-width: 400px; border-radius: 10px;">
            </div>
        </div>

        <img src="image1.jpg" class="gallery-img" alt="Gallery 1">
        <div class="caption">Sometimes silence speaks louder than words.</div>

        <img src="image2.jpg" class="gallery-img" alt="Gallery 2">
        <div class="caption">Stay real in a world full of copies.</div>

        <img src="image3.jpg" class="gallery-img" alt="Gallery 3">
        <div class="caption">What can really go wrong honestly... I hope I am not wrong.</div>

        <div class="glass-panel" style="margin-top: 80px;">
            <h3>Connect with Me</h3>
            <div class="social-links">
                <a href="https://wa.me/263779845632?text=Yo%20Newton,%20I%20saw%20your%20website!" target="_blank" class="social-icon whatsapp">
                    <i class="fab fa-whatsapp"></i>
                </a>

                <a href="https://www.facebook.com/search/top/?q=darktheory04@gmail.com" target="_blank" class="social-icon facebook">
                    <i class="fab fa-facebook-f"></i>
                </a>

                <a href="https://twitter.com/unspokenframes" target="_blank" class="social-icon twitter">
                    <i class="fab fa-twitter"></i>
                </a>
            </div>
        </div>
    </div>

    <button class="scroll-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
        <i class="fas fa-chevron-up"></i>
    </button>

    <script>
        // 1. Theme Toggle
        const themeBtn = document.getElementById('theme-btn');
        themeBtn.onclick = function() {
            document.body.classList.toggle('light-mode');
        };

        // 2. Mood Swapper
        function changeMood(mood) {
            const img = document.getElementById('main-mood-img');
            const text = document.getElementById('mood-text');
            
            if (mood === 'happy') {
                img.src = 'image4.jpg'; 
                text.innerHTML = "Keep smiling, the world needs your light.";
                text.style.color = "#ffcc00";
            } else if (mood === 'deep') {
                img.src = 'image5.jpg';
                text.innerHTML = "Sometimes the deepest rivers flow in silence.";
                text.style.color = "#00d4ff";
            }
        }
    </script>

</body>
</html>
